name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, development ]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Detect changes ───────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            frontend:
              - 'apps/frontend/**'
              - 'package.json'
              - 'package-lock.json'

  # ── Backend ──────────────────────────────────────────────
  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        working-directory: apps/backend
        run: |
          chmod +x mvnw
          ./mvnw dependency:resolve
          ./mvnw test

  backend-build:
    needs: [changes, backend-test]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: apps/backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/backend
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build Docker image (Trivy Scan)
        uses: docker/build-push-action@v7
        with:
          context: apps/backend
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/backend:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ github.repository_owner }}/backend:${{ github.sha }}'
          format: 'table'
          output: 'trivy-backend.txt'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Publish Trivy Output to Summary
        if: always()
        run: |
          if [ -f trivy-backend.txt ]; then
            echo "### Backend - Trivy Security Scan Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-backend.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ── Frontend ─────────────────────────────────────────────
  frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo run lint --filter=@bandanize/frontend

  frontend-build:
    needs: [changes, frontend-lint]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: npx turbo run build --filter=@bandanize/frontend

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build Docker image (Trivy Scan)
        uses: docker/build-push-action@v7
        with:
          context: apps/frontend
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend:${{ github.sha }}'
          format: 'table'
          output: 'trivy-frontend.txt'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Publish Trivy Output to Summary
        if: always()
        run: |
          if [ -f trivy-frontend.txt ]; then
            echo "### Frontend - Trivy Security Scan Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-frontend.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
